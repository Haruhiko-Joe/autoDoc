name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/Haruhiko-Joe/autoDoc/blob/main/docs/CLA.md'
          branch: 'main'
          allowlist: dependabot[bot],renovate[bot]
          remote-organization-name: Haruhiko-Joe
          remote-repository-name: autoDoc-cla-signatures
          custom-notsigned-prc-comment: |
            Thank you for your pull request! Before we can merge it, you need to sign the **autoDoc Contributor License Agreement** ([CLA.md](https://github.com/Haruhiko-Joe/autoDoc/blob/main/docs/CLA.md)).

            **Why this is needed:** autoDoc is dual-licensed under AGPL-3.0 (open source) and a separate commercial license. The CLA ensures the project maintainer retains the right to offer this dual-licensing model. You keep the copyright to your contribution.

            To sign, please post the following comment on this pull request:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prc-comment: 'All contributors have signed the CLA. Thank you!'
